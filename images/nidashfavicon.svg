<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="left-circle">
      <circle cx="12" cy="16" r="10"/>
    </clipPath>
  </defs>
  <!-- Blue circle (left) -->
  <circle cx="12" cy="16" r="10" fill="#0060df"/>
  <!-- Red circle (right) -->
  <circle cx="20" cy="16" r="10" fill="#cc0000"/>
  <!-- Purple intersection: red circle clipped to left circle region -->
  <circle cx="20" cy="16" r="10" fill="#7030a0" clip-path="url(#left-circle)"/>
</svg>
